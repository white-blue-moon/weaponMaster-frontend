server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # 포트가 유지되도록 상대 경로 리다이렉트 사용
    absolute_redirect off;

    # 루트 접근 시 서비스 경로로 이동
    location = / {
        return 302 /weapon-front/;
    }

    # SPA 라우팅 (svelte-routing) fallback
    location /weapon-front/ {
        try_files $uri $uri/ /weapon-front/index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
